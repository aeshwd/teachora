<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teachora | One World One Classroom </title>

<!-- PRELOAD BACKGROUND (SPEED FIX) -->
<link rel="preload" as="image" href="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=1200&q=60">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* ================= GLOBAL ================= */
body {
  margin: 0;
  font-family: "Poppins", sans-serif;
  overflow: hidden;
}

/* ================= SPLASH ================= */
.splash {
  height: 100vh;
  width: 100%;
  position: relative;

  /* FAST FALLBACK COLOR */
  background-color: #0b1220;

  /* IMAGE */
  background-image: url("https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=1200&q=60");
  background-size: cover;
  background-position: center;

  display: flex;
  align-items: center;
  justify-content: center;
}

/* DARK OVERLAY */
.splash::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.65);
}

/* CONTENT */
.content {
  position: relative;
  z-index: 2;
  text-align: center;
}

/* LOGO */
.logo {
  width: 90px;
  height: 90px;
  border-radius: 18px;
  margin-bottom: 10px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  animation: pop 0.8s ease;
}

/* TITLE */
.title {
  font-size: 38px;
  font-weight: 700;
  margin-top: 10px;

  background: linear-gradient(90deg,#60a5fa,#a78bfa,#f472b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* TAGLINE */
.tagline {
  color: #cbd5e1;
  font-size: 14px;
  margin-top: 8px;
}

/* LOTTIE */
lottie-player {
  margin: auto;
}

/* LOADING DOTS */
.dots {
  display: flex;
  justify-content: center;
  margin-top: 20px;
  gap: 6px;
}

.dots span {
  width: 8px;
  height: 8px;
  background: white;
  border-radius: 50%;
  animation: bounce 1s infinite ease-in-out;
}

.dots span:nth-child(2){animation-delay:0.2s}
.dots span:nth-child(3){animation-delay:0.4s}

/* BUTTON */
button {
  margin-top: 25px;
  padding: 12px 26px;
  border: none;
  border-radius: 30px;
  font-size: 14px;
  cursor: pointer;
  color: white;
  background: linear-gradient(90deg,#3b82f6,#8b5cf6);
}

/* ANIMATIONS */
@keyframes bounce {
  0%,100% {transform:translateY(0);opacity:0.5}
  50% {transform:translateY(-8px);opacity:1}
}

@keyframes pop {
  0% {transform:scale(0.6);opacity:0}
  100% {transform:scale(1);opacity:1}
}

/* MOBILE */
@media(max-width:600px){
  .title {font-size:26px}
  .logo {width:70px;height:70px}
}

</style>
</head>

<body>

<section class="splash">

  <div class="content">

    <!-- LOGO -->
    <img src="images/favicon.png" class="logo" alt="logo">

    <!-- LOTTIE ANIMATION -->
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

    <lottie-player
      src="https://assets10.lottiefiles.com/packages/lf20_jcikwtux.json"
      background="transparent"
      speed="1"
      style="width:160px;height:160px"
      loop
      autoplay>
    </lottie-player>

    <!-- TITLE -->
    <div class="title">Teachora</div>

    <!-- TAGLINE -->
    <div class="tagline">Learn Anywhere. Anytime. For Free.</div>

    <!-- LOADING DOTS -->
    <div class="dots">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <!-- BUTTON -->
    <button onclick="goNext()">Get Started</button>

  </div>

</section>

<script>
function goNext(){
  window.location.href = "main.html";
}
</script>

</body>
</html>
